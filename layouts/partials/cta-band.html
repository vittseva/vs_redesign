<!-- ── CTA BAND ────────────────────────────────────────────────────────────── -->
<section class="py-16 bg-gradient-to-r from-primary-dark to-primary">
  <div class="max-w-4xl mx-auto px-6 text-center">
    <div class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-5">
      <i class="fas fa-calendar-check text-white text-2xl"></i>
    </div>
    <h2 class="text-2xl lg:text-3xl font-bold text-white mb-4">
      Ready to take control of your finances?
    </h2>
    <p class="text-white/75 text-base mb-8 max-w-xl mx-auto leading-relaxed">
      Book a free 30-minute consultation with one of our specialists. No commitment, no jargon — just honest advice.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="{{ urls.JoinPath .Site.BaseURL "/contact/" }}"
         class="inline-flex items-center justify-center gap-2 px-8 py-3.5 bg-white text-primary-dark font-bold rounded-xl hover:bg-primary-light transition shadow-lg">
        <i class="fas fa-calendar-check"></i>
        Schedule Free Consultation
      </a>
      <a href="tel:{{ .Site.Params.phone }}"
         class="inline-flex items-center justify-center gap-2 px-8 py-3.5 border-2 border-white/50 text-white font-semibold rounded-xl hover:bg-white/10 transition">
        <i class="fas fa-phone"></i>
        {{ .Site.Params.phone }}
      </a>
    </div>
  </div>
</section>

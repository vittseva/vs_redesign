<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: brand teal rounded square -->
  <rect width="100" height="100" rx="18" fill="#10779D"/>
  
  <!-- VittSeva triangular mark, re-scaled/centred into 100x100 space.
       Original mark bounding box: x≈32-49, y≈3-28  (17w × 25h)
       We scale to fit ~62×62 of usable space, centred with 19px padding.
       transform: translate(19 - 32*s, 19 - 3*s) scale(s)  where s = 62/25 = 2.48 -->
  <g transform="translate(-60.4 , 11.6) scale(2.48)">
    <!-- bottom quad -->
    <path d="M36.5 15.5L44.5 17.5L41.5 28L32.5001 28L36.5 15.5Z" fill="#3DBB4C"/>
    <!-- upper arrow triangle -->
    <path d="M45.4575 3.30139L48.9869 19.2264L32.1485 14.4574L45.4575 3.30139Z" fill="#3DBB4C"/>
  </g>
</svg>